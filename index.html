<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Series Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #F4201E;
  --blue: #28A3DA;
  --bg: #0D0D0F;
  --surface: #17171B;
  --surface2: #1F1F25;
  --border: #2A2A32;
  --text: #FFFFFF;
  --muted: #888899;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
.header { background: var(--surface); border-bottom: 3px solid var(--red); padding: 20px 28px 0; position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: 0; right: 0; width: 40%; height: 100%; background: linear-gradient(135deg, transparent 50%, rgba(244,32,30,0.05) 100%); pointer-events: none; }
.header-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 16px; }
.series-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--red); margin-bottom: 4px; }
.series-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
.season-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-top: 5px; }
.updated-tag { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.5; }
.updated-tag small { display: block; font-size: 11px; color: #444455; }
.tabs { display: flex; position: relative; z-index: 1; }
.tab-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 11px 24px 10px; background: none; border: none; border-bottom: 3px solid transparent; color: var(--muted); cursor: pointer; transition: color 0.15s; position: relative; bottom: -3px; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 3px solid var(--bg); }
.tab-btn.all.active   { border-top: 2px solid var(--muted); }
.tab-btn.mens.active  { border-top: 2px solid var(--red); }
.tab-btn.womens.active{ border-top: 2px solid var(--blue); }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; position: relative; top: -1px; }
.dot-all    { background: var(--muted); }
.dot-mens   { background: var(--red); }
.dot-womens { background: var(--blue); }
.dot-chaos  { background: #F5A623; }
.tab-btn.chaos.active { border-top: 2px solid #F5A623; }
.podium { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.podium-card { background: var(--surface); padding: 18px 20px 16px; position: relative; overflow: hidden; }
.podium-card::after { content: attr(data-pos); font-family: 'Barlow Condensed', sans-serif; font-size: 80px; font-weight: 800; position: absolute; bottom: -12px; right: 12px; opacity: 0.06; color: #fff; line-height: 1; }
.pos-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.podium-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.podium-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 800; color: var(--text); line-height: 1; margin-top: 8px; }
.podium-stats { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.podium-stat { font-size: 12px; color: var(--muted); }
.podium-stat strong { color: var(--text); font-weight: 600; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 10px 14px; text-align: right; white-space: nowrap; }
thead th:first-child, thead th:nth-child(2) { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
tbody tr:hover { background: var(--surface2); }
td { padding: 11px 14px; text-align: right; color: var(--text); white-space: nowrap; }
td:first-child { text-align: left; width: 38px; padding-left: 16px; }
td:nth-child(2) { text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; min-width: 140px; }
.pos-num { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--muted); }
.pts-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; }
.wins-cell { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; }
.wins-cell.zero { color: var(--muted) !important; font-weight: 400; }
.pts-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.pts-bar { height: 4px; background: var(--border); border-radius: 2px; width: 60px; flex-shrink: 0; overflow: hidden; }
.pts-bar-fill { height: 100%; border-radius: 2px; }
.gender-tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 1px 5px; border-radius: 2px; margin-left: 6px; vertical-align: middle; position: relative; top: -1px; }
.gender-tag.w { background: rgba(40,163,218,0.15); color: var(--blue); border: 1px solid rgba(40,163,218,0.3); }
.gender-tag.m { background: rgba(244,32,30,0.12); color: var(--red); border: 1px solid rgba(244,32,30,0.25); }
.state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
.state-msg .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer { padding: 12px 28px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.footer-note { font-size: 11px; color: #333344; letter-spacing: 0.05em; text-transform: uppercase; }
.live-dot { display: inline-block; width: 6px; height: 6px; background: var(--blue); border-radius: 50%; margin-right: 5px; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.pane { display: none; }
.pane.active { display: block; }
@media (max-width: 600px) {
  .series-title { font-size: 22px; }
  .podium { grid-template-columns: 1fr; }
  .podium-card::after { font-size: 60px; }
  thead th:nth-child(n+7) { display: none; }
  td:nth-child(n+7) { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="series-label">Rider Standings</div>
      <div class="series-title">2026 Season</div>
      <div class="season-badge">Points Classification</div>
    </div>
    <div class="updated-tag">
      <span class="live-dot"></span>Live from Google Sheets
      <small id="fetch-time"></small>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn mens active"  onclick="switchTab('m')"><span class="dot dot-mens"></span>Men's</button>
    <button class="tab-btn womens"       onclick="switchTab('w')"><span class="dot dot-womens"></span>Women's</button>
    <button class="tab-btn chaos"        onclick="switchTab('chaos')"><span class="dot dot-chaos"></span>Chaos</button>
  </div>
</header>

<!-- MEN'S tab -->
<div id="pane-m" class="pane active">
  <div id="podium-m" class="podium"></div>
  <div class="table-wrap">
    <table id="table-m" style="display:none">
      <thead><tr>
        <th>Pos</th><th>Rider</th><th>Pts</th><th>Wins</th><th>Chaos</th>
        <th>Top 5s</th><th>Top 10s</th><th>Avg Fin</th><th>Races</th><th>Fin %</th><th>Avg All</th>
      </tr></thead>
      <tbody id="tbody-m"></tbody>
    </table>
  </div>
</div>

<!-- WOMEN'S tab -->
<div id="pane-w" class="pane">
  <div id="podium-w" class="podium"></div>
  <div class="table-wrap">
    <table id="table-w" style="display:none">
      <thead><tr>
        <th>Pos</th><th>Rider</th><th>Pts</th><th>Wins</th><th>Chaos</th>
        <th>Top 5s</th><th>Top 10s</th><th>Avg Fin</th><th>Races</th><th>Fin %</th><th>Avg All</th>
      </tr></thead>
      <tbody id="tbody-w"></tbody>
    </table>
  </div>
</div>

<!-- CHAOS tab -->
<div id="pane-chaos" class="pane">
  <div class="table-wrap">
    <table id="table-chaos" style="display:none">
      <thead><tr>
        <th>Pos</th><th>Rider</th><th>Chaos Pts</th>
      </tr></thead>
      <tbody id="tbody-chaos"></tbody>
    </table>
  </div>
</div>

<footer class="footer">
  <div class="footer-note"><span class="live-dot"></span>Data synced from Google Sheets</div>
  <div class="footer-note">Updates on page refresh</div>
</footer>

<script>
const BASE         = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkmm1p4DmZ97G9MtZpI-uA9npmCyyxGqkhmG_uVhks5U0ZWNcvtFAEoXPB8Q6aFKb3dYPO9F-vVQ1W/pub?single=true&output=csv";
const SETTINGS_GID = "2072593377";
const ROSTER_GID   = "2044157008";

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const cells = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cells.push(cur.trim());
    return cells;
  });
}

async function fetchCSV(gid) {
  const res = await fetch(BASE + '&gid=' + gid);
  if (!res.ok) throw new Error('fetch failed');
  return parseCSV(await res.text());
}

function parseCell(raw) {
  if (!raw || !raw.trim()) return null;
  const s = raw.trim();
  const isFemale = s.includes('*');
  const chaosMatch = s.match(/(\d+)/);
  const chaos = chaosMatch ? parseInt(chaosMatch[1]) : 0;
  const name = s.replace('*', '').replace(/\d+/g, '').trim();
  if (!name) return null;
  return { name, isFemale, chaos };
}

function buildStandings(settingsRows, rosterRows) {
  const genderMap = {};
  rosterRows.forEach(row => {
    const name   = (row[0] || '').trim();
    const gender = (row[2] || '').trim().toLowerCase();
    if (name && (gender === 'm' || gender === 'f')) genderMap[name.toLowerCase()] = gender;
  });

  const rosterNames = rosterRows.map(r => (r[0] || '').trim()).filter(Boolean);
  function canonical(name) {
    return rosterNames.find(n => n.toLowerCase() === name.toLowerCase()) || name;
  }

  const dataRows    = settingsRows.slice(2);
  const numWeekCols = (settingsRows[0] || []).length - 1;

  const weeks = [];
  for (let w = 0; w < numWeekCols; w++) {
    const col = [];
    dataRows.forEach(row => {
      const parsed = parseCell(row[w + 1]);
      if (parsed) col.push(parsed);
    });
    if (col.length > 0) weeks.push(col);
  }

  const riderSet = new Set();
  rosterNames.forEach(n => riderSet.add(n));
  // Seed genderMap from * flag in results data as fallback
  weeks.forEach(col => col.forEach(r => {
    const cname = canonical(r.name);
    riderSet.add(cname);
    if (r.isFemale && !genderMap[cname.toLowerCase()]) {
      genderMap[cname.toLowerCase()] = 'f';
    }
  }));

  const stats = {};
  riderSet.forEach(name => {
    const gender = genderMap[name.toLowerCase()] || 'm';
    stats[name] = { name, gender, points: 0, wins: 0, chaos: 0, top5s: 0, top10s: 0, finishes: 0, posSum: 0 };
  });

  const totalRaces = weeks.length;

  weeks.forEach(col => {
    const maleCol   = col.filter(r => (genderMap[canonical(r.name).toLowerCase()] || (r.isFemale ? 'f' : 'm')) === 'm');
    const femaleCol = col.filter(r => (genderMap[canonical(r.name).toLowerCase()] || (r.isFemale ? 'f' : 'm')) === 'f');

    col.forEach((rider, overallIdx) => {
      const overallPos = overallIdx + 1;
      const name       = canonical(rider.name);
      if (!stats[name]) return;

      const gender    = genderMap[name.toLowerCase()] || (rider.isFemale ? 'f' : 'm');
      const genderCol = gender === 'f' ? femaleCol : maleCol;
      const genderPos = genderCol.findIndex(r => canonical(r.name).toLowerCase() === name.toLowerCase()) + 1;

      stats[name].points   += Math.max(1, 101 - genderPos);
      stats[name].chaos    += rider.chaos;
      stats[name].finishes += 1;
      stats[name].posSum   += overallPos;

      if (genderPos === 1) stats[name].wins   += 1;
      if (genderPos <= 5)  stats[name].top5s  += 1;
      if (genderPos <= 10) stats[name].top10s += 1;
    });
  });

  Object.values(stats).forEach(r => {
    r.avgFin = r.finishes > 0 ? r.posSum / r.finishes : 0;
    r.finPct = totalRaces  > 0 ? (r.finishes / totalRaces) * 100 : 0;
    r.avgAll = totalRaces  > 0 ? r.posSum / totalRaces : 0;
  });

  const sort = arr => arr.sort((a, b) => b.points - a.points || a.avgFin - b.avgFin);
  const active = Object.values(stats).filter(r => r.finishes > 0);
  const all    = sort([...active]);
  const men    = sort(active.filter(r => r.gender === 'm'));
  const women  = sort(active.filter(r => r.gender === 'f'));

  return { all, men, women };
}

function renderPodium(cat, riders, accent, secondary) {
  const podium = document.getElementById('podium-' + cat);
  podium.innerHTML = '';
  ['1st Place','2nd Place','3rd Place'].forEach((label, i) => {
    if (!riders[i]) return;
    const r = riders[i];
    const borders = [accent, secondary, secondary + '66'];
    const badgeC  = [accent, secondary, secondary + '88'];
    const card = document.createElement('div');
    card.className = 'podium-card';
    card.setAttribute('data-pos', i + 1);
    card.style.borderTop = '3px solid ' + borders[i];
    card.innerHTML = `
      <div class="pos-badge" style="color:${badgeC[i]}">${label}</div>
      <div class="podium-name">${r.name}</div>
      <div class="podium-pts">${r.points}<span style="font-size:14px;font-weight:400;color:var(--muted);margin-left:4px">pts</span></div>
      <div class="podium-stats">
        <div class="podium-stat"><strong>${r.wins}</strong> win${r.wins !== 1 ? 's' : ''}</div>
        <div class="podium-stat"><strong>${r.top5s}</strong> top 5s</div>
        <div class="podium-stat"><strong>${r.avgFin > 0 ? r.avgFin.toFixed(1) : "—"}</strong> avg fin</div>
      </div>`;
    podium.appendChild(card);
  });
}

function renderTable(tbodyId, tableId, riders, accent, secondary, showGenderTag) {
  const maxPts = Math.max(...riders.map(r => r.points), 1);
  const s = document.createElement('style');
  s.textContent = `
    #${tbodyId} tr:nth-child(1) td:first-child { border-left: 3px solid ${accent}; }
    #${tbodyId} tr:nth-child(2) td:first-child { border-left: 3px solid ${secondary}; }
    #${tbodyId} tr:nth-child(3) td:first-child { border-left: 3px solid ${secondary}66; }
  `;
  document.head.appendChild(s);

  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  riders.forEach((r, i) => {
    const pct = (r.points / maxPts * 100).toFixed(0);
    const tag = showGenderTag
      ? `<span class="gender-tag ${r.gender}">${r.gender === 'f' ? 'W' : 'M'}</span>`
      : '';
    const tr = document.createElement('tr');

    if (tbodyId === 'tbody-all') {
      // All tab: simplified columns
      tr.innerHTML = `
        <td><span class="pos-num">${i + 1}</span></td>
        <td>${r.name}${tag}</td>
        <td>
          <div class="pts-bar-wrap">
            <span class="pts-cell" style="color:var(--text)">${r.points}</span>
            <div class="pts-bar"><div class="pts-bar-fill" style="width:${pct}%;background:${accent}"></div></div>
          </div>
        </td>
        <td><span class="wins-cell${r.wins === 0 ? ' zero' : ''}" style="color:${r.wins === 0 ? '' : (r.gender === 'f' ? 'var(--blue)' : 'var(--red)')}">${r.wins}</span></td>
        <td style="color:${r.chaos > 0 ? 'var(--text)' : 'var(--muted)'}">${r.chaos > 0 ? r.chaos : '—'}</td>
        <td>${r.finishes}</td>
        <td>${r.finPct.toFixed(0)}%</td>`;
    } else {
      // Men's / Women's tab: full columns
      tr.innerHTML = `
        <td><span class="pos-num">${i + 1}</span></td>
        <td>${r.name}</td>
        <td>
          <div class="pts-bar-wrap">
            <span class="pts-cell" style="color:var(--text)">${r.points}</span>
            <div class="pts-bar"><div class="pts-bar-fill" style="width:${pct}%;background:${accent}"></div></div>
          </div>
        </td>
        <td><span class="wins-cell${r.wins === 0 ? ' zero' : ''}" style="color:${r.wins === 0 ? '' : secondary}">${r.wins}</span></td>
        <td style="color:${r.chaos > 0 ? 'var(--text)' : 'var(--muted)'}">${r.chaos > 0 ? r.chaos : '—'}</td>
        <td>${r.top5s}</td>
        <td>${r.top10s}</td>
        <td>${r.avgFin > 0 ? r.avgFin.toFixed(1) : '—'}</td>
        <td>${r.finishes}</td>
        <td>${r.finPct.toFixed(0)}%</td>
        <td>${r.avgAll > 0 ? r.avgAll.toFixed(1) : '—'}</td>`;
    }
    tbody.appendChild(tr);
  });
  document.getElementById(tableId).style.display = 'table';
}

function renderChaos(riders) {
  const tbody = document.getElementById('tbody-chaos');
  tbody.innerHTML = '';
  const s = document.createElement('style');
  s.textContent = `
    #tbody-chaos tr:nth-child(1) td:first-child { border-left: 3px solid #F5A623; }
    #tbody-chaos tr:nth-child(2) td:first-child { border-left: 3px solid #F5A62399; }
    #tbody-chaos tr:nth-child(3) td:first-child { border-left: 3px solid #F5A62355; }
  `;
  document.head.appendChild(s);
  riders.forEach((r, i) => {
    const tr = document.createElement('tr');
    const genderColor = r.gender === 'f' ? 'var(--blue)' : 'var(--red)';
    const tag = `<span class="gender-tag ${r.gender}">${r.gender === 'f' ? 'W' : 'M'}</span>`;
    tr.innerHTML = `
      <td><span class="pos-num">${i + 1}</span></td>
      <td>${r.name}${tag}</td>
      <td><span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#F5A623">${r.chaos}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('table-chaos').style.display = 'table';
}

function switchTab(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  const btnClass = cat === 'm' ? 'mens' : cat === 'w' ? 'womens' : 'chaos';
  document.querySelector('.tab-btn.' + btnClass).classList.add('active');
  document.getElementById('pane-' + cat).classList.add('active');
}

(async () => {
  try {
    const [settingsRows, rosterRows] = await Promise.all([
      fetchCSV(SETTINGS_GID),
      fetchCSV(ROSTER_GID)
    ]);
    const { all, men, women } = buildStandings(settingsRows, rosterRows);

    // Men's tab
    renderPodium('m', men, '#F4201E', '#28A3DA');
    renderTable('tbody-m', 'table-m', men, '#F4201E', '#28A3DA', false);

    // Women's tab
    renderPodium('w', women, '#28A3DA', '#F4201E');
    renderTable('tbody-w', 'table-w', women, '#28A3DA', '#F4201E', false);

    // Chaos tab — all riders sorted by chaos points
    const chaosRiders = [...all].filter(r => r.chaos > 0).sort((a,b) => b.chaos - a.chaos);
    renderChaos(chaosRiders);

    document.getElementById('fetch-time').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
